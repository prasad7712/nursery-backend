services:
  - type: web
    name: nursery-backend
    runtime: python
    startCommand: "python run_app.py"
    buildCommand: "pip install --upgrade pip setuptools wheel && pip install -r requirements.txt && prisma generate"
    pythonVersion: 3.11
    envVars:
      - key: ENVIRONMENT
        value: production
        scope: build
      - key: PYTHON_VERSION
        value: "3.11"
        scope: build
      - key: DATABASE_URL
        fromDatabase:
          name: nursery_db
          property: connectionString
      - key: PRISMA_DATABASE_URL
        fromDatabase:
          name: nursery_db
          property: connectionString
