services:
  - type: web
    name: nursery-backend
    env: python
    region: ohio
    plan: free
    buildCommand: pip install -r requirements.txt && npx prisma generate
    startCommand: python run_app.py
    envVars:
      - key: DATABASE_URL
        scope: run
        value: mysql://user:password@host:3306/nursery_db?sslaccept=strict
      - key: RAZORPAY_KEY_ID
        value: rzp_test_SYv2yVsVaf8eu0
      - key: RAZORPAY_KEY_SECRET
        value: t4SW2zVEU3kAGN4jZgfwg5Jb
      - key: GOOGLE_GEMINI_API_KEY
        value: your_gemini_api_key_here
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: false
      - key: DEMO_MODE
        value: true
      - key: CORS_ORIGINS
        value: '["http://localhost:3000", "https://nursery-frontend.onrender.com"]'
      - key: JWT_SECRET_KEY
        value: Fa1Fku9ZrkuC2dnmzNQr_Q3WgpDQG12esgzQ8Ot0XUs
