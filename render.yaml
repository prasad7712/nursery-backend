services:
  - type: web
    name: nursery-backend
    runtime: python
    pythonVersion: 3.11
    
    buildCommand: |
      set -e
      echo "==> Python version:"
      python --version
      
      echo "==> Upgrading pip, setuptools, and wheel..."
      pip install --upgrade pip setuptools wheel
      
      echo "==> Installing dependencies with wheel preference..."
      pip install --prefer-binary --no-build-isolation -r requirements.txt
      
      echo "==> Generating Prisma client..."
      python -m prisma generate
      
      echo "==> Fetching Prisma query engine binaries..."
      python -m prisma py fetch
      
      echo "==> Build completed successfully"
    
    startCommand: python run_app.py
    
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PORT
        value: "8001"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: DATABASE_URL
        fromDatabase:
          name: nursery_db
          property: connectionString
      - key: ADMIN_EMAIL
        value: admin@nursery.local
      - key: ADMIN_PASSWORD
        value: Admin@123
      - key: JWT_SECRET_KEY
        value: your-super-secret-jwt-key-change-in-production
      - key: RAZORPAY_KEY_ID
        value: rzp_test_key
      - key: RAZORPAY_KEY_SECRET
        value: rzp_test_secret
      - key: GROQ_API_KEY
        value: gsk_your_groq_api_key

databases:
  - name: nursery_db
    databaseName: nursery_db
    user: nursery_user
    region: oregon
    plan: free
